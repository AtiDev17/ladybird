name: Windows Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    env:
      # We move away from x-gha and use standard caching
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      CMAKE_C_COMPILER_LAUNCHer: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Expose GitHub Actions cache environment variables for sccache
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Setup sccache for Ladybird code compilation
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      # MANUAL VCPKG CACHE: This is the critical fix.
      # It saves the pre-compiled binaries for Qt6, ffmpeg, skia, etc.
      - name: Restore vcpkg binary cache
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          # The key uses the hash of vcpkg.json so it updates when dependencies change
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json', 'Meta/CMake/vcpkg/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install dependencies
        run: |
          choco install pkgconfiglite -y
          # Ensure the cache directory exists so vcpkg doesn't error out
          if not exist "${{ github.workspace }}\vcpkg_cache" mkdir "${{ github.workspace }}\vcpkg_cache"
        shell: cmd

      - name: Build Ladybird
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          # We pass the cache location to the build script
          py Meta\ladybird.py build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-windows-x64
          path: Build/release/bin/
          retention-days: 14
