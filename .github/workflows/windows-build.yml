name: Windows Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build-windows:
    # Note: If you have access to larger runners, change this to 'windows-latest-8-core' 
    runs-on: windows-latest
    
    env:
      # Instruct vcpkg to use the native GitHub Actions cache backend
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      # Instruct CMake (used under the hood by Ladybird) to use sccache
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
      # Instruct sccache to use the native GitHub Actions cache backend
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # REQUIRED FOR VCPKG CACHE: Exposes the internal GitHub Actions cache tokens to vcpkg
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # REQUIRED FOR SCCACHE: Installs the mozilla sccache wrapper
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      # The build instructions specify that pkg-config is required for vcpkg to work on Windows
      - name: Install dependencies
        run: |
          choco install pkgconfiglite -y

      # Ladybird requires a VS command prompt environment for the Clang-CL experimental build
      - name: Build Ladybird
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          py Meta\ladybird.py build

      # Upload the compiled binaries as a downloadable artifact
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-windows-x64
          # Adjust this path if Ladybird outputs the executable to a different specific folder
          path: Build/release/bin/
          retention-days: 14
