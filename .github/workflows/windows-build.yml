name: Windows Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cleanly injects the MSVC C++ compiler environment into the runner
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          key: ${{ runner.os }}-ccache
          max-size: 10G

      - name: Restore vcpkg binary cache
        id: cache-vcpkg-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/vcpkg.json', 'Meta/CMake/vcpkg/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install dependencies
        run: |
          choco install pkgconfiglite -y
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\vcpkg_cache" | Out-Null
        shell: pwsh

      - name: Build Ladybird
        run: py Meta\ladybird.py build

      # Stages the exe, dlls, and UI resources side-by-side so Ladybird can find them
      - name: Package Artifacts
        run: |
          New-Item -ItemType Directory -Force -Path "ladybird-package\bin"
          New-Item -ItemType Directory -Force -Path "ladybird-package\share"
          Copy-Item -Path "Build\release\bin\*" -Destination "ladybird-package\bin\" -Recurse -Force
          Copy-Item -Path "share\*" -Destination "ladybird-package\share\" -Recurse -Force
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-windows-x64
          path: ladybird-package/
          retention-days: 14

      - name: Save vcpkg binary cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: ${{ steps.cache-vcpkg-restore.outputs.cache-primary-key }}
